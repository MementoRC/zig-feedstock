c_stdlib:
  - if: linux
    then:
      - sysroot
  - if: osx
    then:
      - macosx_deployment_target
  - if: not unix
    then:
      - vs
c_stdlib_version:
  - if: linux
    then:
      - "2.17"
  - if: osx
    then:
      - "11.0"
  - if: not unix
    then:
      - "2022.14"

c_compiler_version:
  - if: osx
    then:
      - "20"
cxx_compiler_version:
  - if: osx
    then:
      - "20"
  
llvm_version:
  - "20"
llvm_src_version:
  - "20.1.8"

zig_compiler:
  - zig
zig_compiler_version:
  - "0.15.2"

cross_target_platform_:
  - linux-64
  - linux-aarch64
  - linux-ppc64le
  - linux-riscv64
  - osx-64
  - osx-arm64
  - win-64
  - win-arm64

# This builds, but is it not EOL?
#  - linux-s390x
