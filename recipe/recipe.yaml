schema_version: 1

context:
  build_number: 0
  name: zig
  version: "0.16.0"

  library: ${{ "Library/" if not unix else "" }}
  m2: ${{ "m2-" if not unix else "" }}
  sh: ${{ ".bat" if not unix else ".sh" }}
  bat: ${{ ".bat" if not unix else "" }}
  exe: ${{ ".exe" if not unix else "" }}

  # Zig target mapping (for zig -target flag, differs from GCC triplets)
  zig_triplet: >-
    ${{
      "x86_64-linux-gnu." ~ c_stdlib_version        if cross_target_platform_ == "linux-64"              else
      "aarch64-linux-gnu." ~ c_stdlib_version       if cross_target_platform_ == "linux-aarch64"         else
      "powerpc64le-linux-gnu." ~ c_stdlib_version   if cross_target_platform_ == "linux-ppc64le"         else
      "riscv64-linux-gnu." ~ c_stdlib_version       if cross_target_platform_ == "linux-riscv64"         else
      "s390x-linux-gnu." ~ c_stdlib_version         if cross_target_platform_ == "linux-s390x"           else
      "x86_64-macos." ~ c_stdlib_version ~ "-none"  if cross_target_platform_ == "osx-64"                else
      "aarch64-macos." ~ c_stdlib_version ~ "-none" if cross_target_platform_ == "osx-arm64"            else
      "x86_64-windows-msvc"                         if cross_target_platform_ == "win-64"                else
      "aarch64-windows-msvc"                        if cross_target_platform_ == "win-arm64"             else
      "native"
    }}

  # Conda-style triplet for binary prefixes (e.g., x86_64-conda-linux-gnu-zig)
  conda_triplet: >-
    ${{
      "x86_64-conda-linux-gnu"                      if cross_target_platform_ == "linux-64"              else
      "aarch64-conda-linux-gnu"                     if cross_target_platform_ == "linux-aarch64"         else
      "powerpc64le-conda-linux-gnu"                 if cross_target_platform_ == "linux-ppc64le"         else
      "riscv64-conda-linux-gnu"                     if cross_target_platform_ == "linux-riscv64"         else
      "s390x-conda-linux-gnu"                       if cross_target_platform_ == "linux-s390x"           else
      "x86_64-apple-darwin13.4.0"                   if cross_target_platform_ == "osx-64"                else
      "arm64-apple-darwin20.0.0"                    if cross_target_platform_ == "osx-arm64"             else
      "x86_64-w64-mingw32"                          if cross_target_platform_ == "win-64"                else
      "aarch64-w64-mingw32"                         if cross_target_platform_ == "win-arm64"             else
      "unknown"
    }}

  # Build mode detection helpers
  # Which platform builds cross-compilers for each target
  cross_build_platform: >-
    ${{
      "linux-64"                                    if cross_target_platform_ in [
          "linux-64",
          "linux-aarch64",
          "linux-ppc64le",
          "linux-riscv64",
          "linux-s390x"
       ]                                                                                                 else
      build_platform                                if cross_target_platform_ in ["osx-64", "osx-arm64"] and build_platform in ["osx-64", "osx-arm64"] else
      build_platform                                if cross_target_platform_ in ["win-64", "win-arm64"] and build_platform in ["win-64", "win-arm64"] else
      "unknown"
    }}

  build_triplet: >-
    ${{
      "x86_64-conda-linux-gnu"                      if build_platform == "linux-64"                      else
      "aarch64-conda-linux-gnu"                     if build_platform == "linux-aarch64"                 else
      "x86_64-apple-darwin13.4.0"                   if build_platform == "osx-64"                        else
      "arm64-apple-darwin20.0.0"                    if build_platform == "osx-arm64"                     else
      "x86_64-w64-mingw32"                          if build_platform == "win-64"                        else
      "unknown"
    }}

  #    "powerpc64le-conda-linux-gnu"                if build_platform == "linux-ppc64le"                 else
  #    "aarch64-w64-mingw32"                        if build_platform == "win-arm64"                     else

  is_hosted_xcompiler: ${{ build_platform == target_platform and cross_target_platform_ != target_platform and cross_build_platform == build_platform }}
  is_unhosted_xcompiler: ${{ cross_target_platform_ == "osx-64" and target_platform == "osx-arm64" or cross_target_platform_ == "win-64" and target_platform == "win-arm64" }}
  xc_build_platform: >-
    ${{
      build_platform                                if is_hosted_xcompiler                               else
      "osx-arm64"                                   if cross_target_platform_ == "osx-64"                else
      "win-arm64"                                   if cross_target_platform_ == "win-64"                else
      "unknown"
    }}

  xc_build_triplet: >-
    ${{
      "arm64-apple-darwin20.0.0"                    if cross_target_platform_ == "osx-64"                else
      "aarch64-w64-mingw32"                         if cross_target_platform_ == "win-64"                else
      build_triplet
    }}

  is_native: ${{ build_platform == target_platform and cross_target_platform_ == build_platform }}
  is_cross_compiler: ${{ is_hosted_xcompiler or is_unhosted_xcompiler }}
  is_cross_target: ${{ build_platform != target_platform and cross_target_platform_ == target_platform }}
  
recipe:
  name: zig-package
  version: ${{ version }}

source:
  - url: https://codeberg.org/ziglang/zig/archive/${{ version }}.tar.gz
    sha256: 095d7483008e885e65d8c6a57fb97c57344f995408a648b8d50f61278ad85d7f
    patches:
      # All platforms: wire LLD MachO into zig cc pipeline + allow -fuse-ld=lld.
      # macho-lld-support must apply before prefer-shared-libcxx because the
      # latter patches code inside the machoLink function added by the former.
      - patches/Lld.zig-macho-lld-support.patch
      - patches/Lld.zig-prefer-shared-libcxx.patch
      - patches/llvm.zig-lld-ofmt-macho.patch
      - patches/Config.zig-macho-no-auto-lld.patch
      - patches/main.zig-fuse-ld-lld-cc-path.patch
      # NOTE: patches/zig_llvm.cpp-mingw-def-dll-suffix.patch is obsolete —
      # upstream 0.16 rewrote MinGW .def parsing in pure Zig
      # (src/libs/mingw/def.zig) and already appends `.dll` to LIBRARY names
      # without extensions, so this patch has been dropped permanently.
      - if: linux
        then:
          - patches/linux/build.zig-01-maxrss.patch
          - patches/linux/build.zig-02-doctest-forward-target.patch
          # NOTE: patches/linux/posix.zig-glibc-2.17-fstat.patch is obsolete —
          # `std.posix.fstat` was removed entirely in 0.16; no callers remain.
          - patches/linux/llvm.zig-triple-no-glibc-version.patch
          # NOTE: patches/linux/Object.zig-elf-zstd-decompression.patch is
          # obsolete — zig 0.16 upstream already supports ZSTD-compressed ELF
          # sections (src/link/Elf/Object.zig .ZSTD branch).
          # NOTE: patches/linux/Elf.zig-debug-tag-bare-TODO-panics.patch was
          # a diagnostic-only patch (tagging @panic("TODO") sites during 0.15
          # debugging); not needed for the 0.16 upgrade.
          - patches/linux/link.zig-01-ldscript-relpath-and-l-flags.patch
          - patches/linux/link.zig-02-default-allow-so-scripts.patch
          - patches/linux/link.zig-03-ldscript-sysroot-remap.patch
      # NB: ppc64le patches are gated on cross_target_platform_ (not the
      # build platform) so they only run when actually targeting
      # linux-ppc64le. The previous `linux and (x86_64 or ppc64le)` gate
      # applied them to every linux-64-cross build and a single broken
      # hunk in the unrebased ppc64le stack killed linux-64, linux-aarch64
      # and linux-riscv64 before their own patches ran.
      # NOTE: 0001-arch-support-st-other-{Object,SharedObject}.zig.patch
      # were obsolete in 0.16 — upstream replaced the raw cast with
      # `@truncate(@as(u3, ...))` which already masks the arch-specific
      # high bits of st_other.
      - if: cross_target_platform_ == "linux-ppc64le"
        then:
          # Phase 0001: Architecture Support (add PowerPC64LE to CPU arch switches)
          - patches/ppc64le/0001-arch-support-relocation.zig.patch
          - patches/ppc64le/0001-arch-support-LdScript.zig.patch
          - patches/ppc64le/0001-arch-support-Elf.zig.patch
          - patches/ppc64le/0001-arch-support-Atom.zig.patch
          - patches/ppc64le/0001-arch-support-LinkerDefined.zig.patch
          - patches/ppc64le/0001-arch-support-ZigObject.zig.patch
          - patches/ppc64le/0001-arch-support-synthetic_sections.zig.patch
          - patches/ppc64le/0001-arch-support-eh_frame.zig.patch
          - patches/ppc64le/0001-arch-support-Thunk.zig.patch
          # Phase 0002: Build Configuration (LLVM backend, library paths)
          - patches/ppc64le/0002-build-config-build.zig.patch
          # Phase 0003: Linker Redirection (comprehensive GCC linker with full flag translation)
          # NOTE: 0003-ldscript-output-format.patch dropped — it duplicates the
          # `elf64-powerpcle` entry already added by 0001-arch-support-LdScript.zig.patch.
          - patches/ppc64le/0003-linker-redirect-link.zig.patch
          - patches/ppc64le/0003-gcc-linker-comprehensive-Lld.zig.patch
      - if: not unix
        then:
          - patches/non_unix/build.zig-maxrss-search-prefix.patch
          - patches/non_unix/build.zig-dynamic-ucrt-win64.patch
          - patches/non_unix/CMakeLists.txt-01-correct-LLVM_LIBRARIES.patch
          - patches/non_unix/Lld.zig-remove-ucrt.patch
          - patches/non_unix/CMakeLists.txt-02-MD-libzigcpp.patch
          - patches/non_unix/test-floatop-skip-log2-vec-win-msvc.patch
    target_directory: zig-source
  # Bootstrap zig binary from upstream (ziglang.org) for osx.
  # The conda-forge zig_impl 0.15.2 pins libcxx 20.*, which clashes with
  # the LLVM-21 compiler stack required by 0.16. Using upstream's pre-built
  # binary sidesteps the solver conflict; see build.sh for the handoff.
  #
  # The tarball must match the BUILD machine's arch (what rattler-build
  # runs on), not the target. conda-forge's Azure uses osx-64 runners
  # even for the `osx_arm64_*` variant labels, so we can't just gate on
  # target=osx-arm64 — we'd ship an arm64 binary to an x86_64 host. Two
  # separate source entries, each gated on the build platform.
  # Every platform bootstraps from upstream 0.16.0 pre-built binaries.
  # conda-forge's zig_impl 0.15.2 can't parse 0.16's build.zig
  # (use_new_linker / graph.io fields), which forces the CMake
  # fallback bootstrap path — and that path hits arch-specific bugs:
  #   - osx-arm64 native: zig1 (baked into stage1/zig1.wasm by older
  #     Zig) emits x86_64 asm in compiler_rt.c even with -target
  #     aarch64-macos.
  #   - win-64: MSVC rejects zig2.c's zero-sized array idiom (C2466).
  #   - linux-ppc64le: zig2.c compiles to functions larger than ppc64
  #     direct-branch range (±32MB), producing operand-out-of-range
  #     assembler errors.
  #   - osx libcxx ABI: 0.15.2 build env pins libcxx 20, we need 21.
  # A 0.16.0 bootstrap parses 0.16's build.zig natively so `zig build`
  # succeeds on the first attempt and CMake is never touched.
  - if: build_platform == "osx-arm64"
    then:
      - url: https://ziglang.org/download/0.16.0/zig-aarch64-macos-0.16.0.tar.xz
        sha256: b23d70deaa879b5c2d486ed3316f7eaa53e84acf6fc9cc747de152450d401489
        target_directory: zig-bootstrap
  - if: build_platform == "osx-64"
    then:
      - url: https://ziglang.org/download/0.16.0/zig-x86_64-macos-0.16.0.tar.xz
        sha256: 0387557ed1877bc6a2e1802c8391953baddba76081876301c522f52977b52ba7
        target_directory: zig-bootstrap
  - if: build_platform == "win-64"
    then:
      - url: https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip
        sha256: 68659eb5f1e4eb1437a722f1dd889c5a322c9954607f5edcf337bc3684a75a7e
        target_directory: zig-bootstrap
  - if: build_platform == "linux-64"
    then:
      - url: https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
        sha256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
        target_directory: zig-bootstrap
  - if: build_platform == "linux-aarch64"
    then:
      - url: https://ziglang.org/download/0.16.0/zig-aarch64-linux-0.16.0.tar.xz
        sha256: ea4b09bfb22ec6f6c6ceac57ab63efb6b46e17ab08d21f69f3a48b38e1534f17
        target_directory: zig-bootstrap
  - if: build_platform == "linux-ppc64le"
    then:
      - url: https://ziglang.org/download/0.16.0/zig-powerpc64le-linux-0.16.0.tar.xz
        sha256: 18800b45c08bf40b335ca5ab79aea70aca287ca969036e938155772becaeebeb
        target_directory: zig-bootstrap

build:
  number: ${{ build_number }}

outputs:
  # ==========================================================================
  # IMPLEMENTATION: zig_impl_$cross_target_platform_ (binaries + stdlib ONLY)
  # Contains actual zig compiler binary (triplet-prefixed) and standard library
  # NO activation scripts, NO wrappers - just the implementation
  # ==========================================================================
  - package:
      name: zig_impl_${{ cross_target_platform_ }}
    build:
      # Skip cross-target ppc64le: the upstream 0.16.0 bootstrap binary
      # lacks the `elf64-powerpcle` OUTPUT_FORMAT entry in LdScript.zig
      # (our patch fixes it in source but the prebuilt bootstrap can't
      # consume it), so it can't parse conda's ppc64le libc.so linker
      # script during the final `zig build` link step.  The
      # `linux_64_cross_target_platform_linux-ppc64le` variant still
      # runs (target_platform=linux-64, it's the cross-compiler build,
      # no ppc64le linking happens).
      skip: not (is_native or is_cross_target) or cross_target_platform_ == "win-arm64" or cross_target_platform_ == "linux-s390x" or (is_cross_target and cross_target_platform_ == "linux-ppc64le")
      dynamic_linking:
        missing_dso_allowlist:
          - if: osx
            then: /usr/lib/libSystem.B.dylib
          - if: not unix
            then: "*/VERSION.dll"
      script:
        # Explicit file: a `script: { env: {...} }` block without `file:` or
        # `content:` is treated as an empty inline script by rattler-build
        # 0.63+ (earlier versions fell back to the default). Be explicit,
        # and gate on the target platform so Windows picks up build.bat.
        file: ${{ "build.bat" if not unix else "build.sh" }}
        env:
          BUILD_NUMBER: ${{ build_number }}
          CONDA_TRIPLET: ${{ conda_triplet }}
          ZIG_TRIPLET: ${{ zig_triplet }}

          CONDA_ZIG_BUILD: ${{ build_triplet ~ "-zig" }}
          CONDA_ZIG_HOST: ${{ conda_triplet ~ "-zig" }}

          # CMake fallback: the 0.15.2 bootstrap can't parse 0.16's build.zig
          # (new fields like `use_new_linker`, `io`) - fall back to upstream's
          # CMake-driven stage1-stage2 bootstrap when `zig build` rejects it.
          CMAKE_FALLBACK: "0"
          
          # --- FORCING REBUILD of native zig due to incompatible previous build version in conda-forge ---
          # BUILD_NATIVE_ZIG: ${{ cross_target_platform_ == "linux-ppc64le" and is_cross_compiler }}

          # --- DEBUGGING ---
          # DEBUG_ZIG_BUILD: "1"
          # ZIG_USE_CACHE: "1"
    requirements:
      build:
        # --- Common build deps (all cases) ---
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - ${{ m2 }}bash >=5.2
        - ${{ m2 }}file
        - cmake >=3.5
        - ninja
        - perl 5.32.*
        - python 3.12.*
        - if: not unix
          then:
            - ${{ m2 }}gawk
            - ${{ m2 }}coreutils
            - ${{ m2 }}findutils
            - ${{ m2 }}which
        # NOTE: libcxx is deliberately NOT listed in the build env on osx.
        # The bootstrap zig_impl (previous release, 0.15.2) was linked against
        # libcxx 20 and pins `libcxx 20.*` as a run dep; pinning libcxx 21.*
        # here would make the build env unsolvable. libcxx 21 is still pulled
        # into the host env below for the new zig to link against.
        - if: (build_platform != target_platform)
          then:
            - llvmdev ${{ llvm_version }}.*  # llvm-config
            - if: osx
              then:
                - libxml2-devel

        # Self-hosting: build zig with zig.
        # On osx (either arch) we bootstrap from an upstream tarball (see
        # `source:`) because the published conda-forge zig_impl 0.15.2
        # pins libcxx 20.* and conflicts with the LLVM-21 toolchain
        # required by 0.16. Other platforms still use the conda-forge
        # bootstrap.
        - if: not osx
          then:
            - zig_impl_${{ build_platform }} >=0.15.2
      host:
        - clangdev ${{ llvm_version }}.*
        - libclang-cpp ${{ llvm_version }}.*
        - llvm ${{ llvm_version }}.*
        - libxml2-devel
        - lld ${{ llvm_version }}.*
        - zlib
        - zstd
        - if: osx
          then:
            - libcxx ${{ llvm_version }}.*
            - libxml2-devel
      run:
        - if: ppc64le
          then:
            # We redirect linking to gcc/ld.bfd
            - binutils_impl_${{ target_platform }} >=2.45
            - gcc_impl_${{ target_platform }} >=14.3
        - if: osx
          then:
            - libcxx ${{ llvm_version }}.*
      ignore_run_exports:
        by_name:
          - if: linux
            then:
              - libxml2-16
          - if: not unix
            then:
              - ucrt
              - vc14_runtime
    tests:
      # Package contents verification - impl has triplet-prefixed binary
      - package_contents:
          strict: true
          bin:
            - ${{ conda_triplet }}-zig
          files:
            # With the upstream 0.16.0 bootstrap, `zig build` succeeds on
            # the first attempt and produces langref.html. Keep this
            # check active; CMake-fallback paths are no longer taken.
            - ${{ library }}doc/langref.html
            - ${{ library }}lib/zig/{c,compiler_rt,fuzzer,ubsan_rt}.zig
            - ${{ library }}lib/zig/zig.h
            - ${{ library }}lib/zig/build-web/*
            - ${{ library }}lib/zig/c/*.zig
            - ${{ library }}lib/zig/c/stdlib/*.zig
            - ${{ library }}lib/zig/c/sys/*.zig
            - ${{ library }}lib/zig/compiler/*
            - ${{ library }}lib/zig/compiler_rt/*
            - ${{ library }}lib/zig/docs/*
            - ${{ library }}lib/zig/include/*
            - ${{ library }}lib/zig/init/*
            - ${{ library }}lib/zig/libc/*
            - ${{ library }}lib/zig/libcxx/*
            - ${{ library }}lib/zig/libcxxabi/*
            - ${{ library }}lib/zig/libunwind/*
            - ${{ library }}lib/zig/libtsan/*
            - ${{ library }}lib/zig/std/*
            # Post-install tests
            - etc/conda/test-files/zig*
      # Shared libc++ discovery tests (patch 0008)
      - script:
          - ${{ 'set' if not unix else '' }} PYTHONIOENCODING=utf-8 python testing/test_libcxx_shared.py ${{ conda_triplet }}
        requirements:
          run:
            - python >=3.10
            - libcxx
        files:
          recipe:
            - testing/test_libcxx_shared.py
      # Functional test using triplet-prefixed binary
      - script:
          - if: not arm64
            then:
              - if: unix
                then:
                  - export ZIG_GLOBAL_CACHE_DIR="${HOME:-${TMPDIR:-/tmp}}/.local/share/zig/zig-cache"
                else:
                  - set ZIG_GLOBAL_CACHE_DIR=%TEMP%\zig-cache
              - ${{ conda_triplet }}-zig version
              - ${{ conda_triplet }}-zig zen
              - ${{ conda_triplet }}-zig init
              - ${{ conda_triplet }}-zig test zig-source/test/behavior.zig
            else:
              - echo "Skip test on arm64"
        files:
          source:
            - zig-source/test
      # Verify zig cc compile+run works (MSYS2 UCRT DLL resolution on Windows)
      - script:
          - if: not unix
            then:
              - echo int main(void){return 0;} > %TEMP%\test_run.c
              - ${{ conda_triplet }}-zig cc -mconsole -o %TEMP%\test_run.exe %TEMP%\test_run.c
              - '%TEMP%\test_run.exe'
              - echo PASS zig cc compile+run (UCRT DLL resolution)
      # Verify MinGW import libs were pre-generated in lib-common/
      - script:
          - if: not unix
            then:
              - for %%L in (kernel32 advapi32 shell32 user32 ws2_32 ole32 uuid msvcrt ucrtbase) do if not exist %LIBRARY_PREFIX%\lib\zig\libc\mingw\lib-common\lib%%L.a (echo FAIL missing lib%%L.a && exit /b 1)
              - echo PASS MinGW import libs present (Windows)
          - if: unix and (win-64 in cross_target_platform_ or win-arm64 in cross_target_platform_)
            then:
              - for lib in kernel32 advapi32 shell32 user32 ws2_32 ole32 uuid msvcrt ucrtbase; do test -f "$PREFIX/lib/zig/libc/mingw/lib-common/lib${lib}.a" || { echo "FAIL missing lib${lib}.a"; exit 1; }; done
              - echo "PASS MinGW import libs present (cross-compiled)"
      # Verify -fuse-ld=lld patch: zig cc must honor -fuse-ld=lld and pass
      # unrecognized linker args to LLD instead of rejecting them.
      # Verify -fuse-ld=lld patch (Linux/ELF + NonUnix/COFF, not macOS/Mach-O)
      - script:
          - if: unix
            then:
              - export ZIG_GLOBAL_CACHE_DIR="${HOME:-${TMPDIR:-/tmp}}/.local/share/zig/zig-cache"
            else:
              - set ZIG_GLOBAL_CACHE_DIR=%TEMP%\zig-cache
          - if: linux and not ppc64le and not arm64
            then:
              # Linux: test with ELF --dynamic-list
              - echo 'int main(void){return 0;}' > /tmp/test_lld.c
              - echo '{ main; };' > /tmp/test_lld.dyn
              - ${{ conda_triplet }}-zig cc -fuse-ld=lld -Wl,--dynamic-list=/tmp/test_lld.dyn -o /tmp/test_lld /tmp/test_lld.c
              - echo "PASS -fuse-ld=lld with --dynamic-list (Linux/ELF)"
          - if: not unix
            then:
              # NonUnix: test with COFF -- verify -fuse-ld=lld compiles+links+runs
              # Running the binary validates MSYS2 UCRT DLL resolution (api-ms-win-crt-*)
              - echo int main(void){return 0;} > %TEMP%\test_lld.c
              - ${{ conda_triplet }}-zig cc -fuse-ld=lld -mconsole -o %TEMP%\test_lld.exe %TEMP%\test_lld.c
              - '%TEMP%\test_lld.exe'
              - echo PASS -fuse-ld=lld compile+link+run (NonUnix/COFF)
          - if: osx
            then:
              # macOS: test with Mach-O -exported_symbols_list via LLD
              - echo 'int main(void){return 0;}' > /tmp/test_lld.c
              - echo '_main' > /tmp/test_lld.exp
              - ${{ conda_triplet }}-zig cc -fuse-ld=lld -Wl,-exported_symbols_list,/tmp/test_lld.exp -o /tmp/test_lld /tmp/test_lld.c
              - echo "PASS -fuse-ld=lld with -exported_symbols_list (macOS/Mach-O via LLD)"
          - if: ppc64le and linux
            then:
              # LLD lacks ppc64le relocation support; wrapper guard tested via
              # test_zig_toolchain.py (activation package). Raw binary has no wrapper.
              - echo "Skip -fuse-ld=lld test on ppc64le (no wrapper in zig_impl_)"

  # ==========================================================================
  # ACTIVATION: zig_$cross_target_platform_ (scripts)
  # Contains activation scripts, depends on zig_impl_$cross_target_platform_
  # NO binaries - just the environment setup
  # ==========================================================================
  - package:
      name: zig_${{ cross_target_platform_ }}
    build:
      skip: not (is_native or is_cross_compiler or is_cross_target) or (is_cross_target and cross_target_platform_ == "linux-ppc64le")
      script:
        file: install_zig_activation.py
        env:
          ZIG_TRIPLET: ${{ zig_triplet }}
          CONDA_TRIPLET: ${{ conda_triplet }}
          CROSS_COMPILER: ${{ is_cross_compiler }}
          NATIVE_TRIPLET: ${{ xc_build_triplet }}
          # Zig toolchain identification (independent of gcc TOOLCHAIN)
          # Includes -zig suffix so value is directly usable as binary name
          CONDA_ZIG_BUILD: ${{ xc_build_triplet ~ "-zig" }}
          CONDA_ZIG_HOST: ${{ conda_triplet ~ "-zig" }}

          # --- FORCING REBUILD of native zig due to incompatible previous build version in conda-forge ---
          # BUILD_NATIVE_ZIG: ${{ cross_target_platform_ == "linux-ppc64le" and is_cross_compiler }}
          LLVM_VERSION: ${{ llvm_version }}
    requirements:
      build:
        - ${{ m2 }}bash
        - python 3.12.*
        # Need zig to compile .exe shims on non-Unix (cross-compiler shim).
        # NB: lower bound is the previous conda-forge release (>=0.15.2),
        # not ${{ version }}. A strict ==0.16.0 pin during the first 0.16
        # CI run is unsatisfiable because the matching zig_impl isn't
        # published in conda-forge yet, and a sibling variant's just-built
        # impl isn't visible in the cross variant's test environment.
        # run_exports still enforce proper ABI compat for end users.
        - if: is_cross_compiler and not unix
          then:
            - zig_impl_${{ xc_build_platform }} >=0.15.2
      host:
        - if: not is_cross_compiler
          then:
            - ${{ pin_subpackage("zig_impl_" ~ cross_target_platform_, exact=True) }}
      run:
        # For native/cross-target: depend on zig_impl for same cross_target_platform_ (pin_subpackage works)
        # For cross-compiler: depend on zig_impl for BUILD platform (external package).
        # See note above re: >=0.15.2 lower bound during 0.16 CI.
        - if: is_cross_compiler
          then:
            - zig_impl_${{ xc_build_platform }} >=0.15.2
          else:
            - ${{ pin_subpackage("zig_impl_" ~ cross_target_platform_, exact=True) }}
        - if: cross_target_platform_ == "linux-ppc64le"
          then:
            # ppc64le patches redirect zig linking to gcc/ld.bfd
            # (LLD lacks PowerPC64 relocation support)
            - binutils_impl_${{ cross_target_platform_ }} >=2.45
            - gcc_impl_${{ cross_target_platform_ }} >=14.3
    tests:
      - package_contents:
          strict: true
          bin:
            - if: is_cross_compiler
              then:
                - ${{ conda_triplet }}-zig
          files:
            - etc/conda/activate.d/zig_activate${{ sh }}
            - etc/conda/deactivate.d/zig_deactivate${{ sh }}
            
            - ${{ library }}share/zig/wrappers/zig-cc${{ exe }}
            - ${{ library }}share/zig/wrappers/zig-cxx${{ exe }}
            
            - ${{ library }}share/zig/wrappers/zig-ar${{ bat }}
            - ${{ library }}share/zig/wrappers/zig-ranlib${{ bat }}
            - ${{ library }}share/zig/wrappers/zig-asm${{ bat }}
            - ${{ library }}share/zig/wrappers/zig-rc${{ bat }}
            - ${{ library }}share/zig/wrappers/zig-lld${{ bat }}
            - if: unix
              then:
                - share/zig/wrappers/_zig-cc-common.sh
                - share/zig/wrappers/_zig-force-load-common.sh
                - share/zig/wrappers/zig-force-load-cc
                - share/zig/wrappers/zig-force-load-cxx
            # Post-install tests
            - etc/conda/test-files/zig*
      - script:
          - if: arm64 not in cross_target_platform_
            then:
              - ${{ conda_triplet }}-zig version
            else:
              - echo "Skip functional tests on arm64"
          # Verify CONDA_ZIG_BUILD and CONDA_ZIG_HOST are set by activation
          - if: unix
            then:
              - test -n "$CONDA_ZIG_BUILD"
              - test -n "$CONDA_ZIG_HOST"
              - echo "CONDA_ZIG_BUILD=$CONDA_ZIG_BUILD"
              - echo "CONDA_ZIG_HOST=$CONDA_ZIG_HOST"
              - test "$CONDA_ZIG_HOST" = "${{ conda_triplet }}-zig"
            else:
              - if not defined CONDA_ZIG_BUILD exit /b 1
              - if not defined CONDA_ZIG_HOST exit /b 1
              - echo CONDA_ZIG_BUILD=%CONDA_ZIG_BUILD%
              - echo CONDA_ZIG_HOST=%CONDA_ZIG_HOST%
          # Wrapper + functional validation tests (Python, cross-platform)
          - if: unix
            then: PYTHONIOENCODING=utf-8 python testing/test_zig_toolchain.py
          - if: not unix
            then: set PYTHONIOENCODING=utf-8 && python testing/test_zig_toolchain.py
          # Cross-compiler .exe shim test (non-Unix only)
          - if: is_cross_compiler and not unix
            then:
              - set "CONDA_TRIPLET=${{ conda_triplet }}" && testing\test-cross-shim.bat
        requirements:
          run:
            - python >=3.10
            - if: ppc64le
              then:
                - bash >=5.2
                - libclang-cpp ${{ llvm_version }}.*
        files:
          recipe:
            - testing/test_zig_toolchain.py
            - testing/test-cross-shim.bat

  # ==========================================================================
  # METAPACKAGE: zig (native symlinks)
  # Creates unprefixed symlinks: zig -> $TRIPLET-zig
  # Only built when cross_target_platform_ == target_platform
  # ==========================================================================
  - package:
      name: zig
    build:
      skip: cross_target_platform_ != target_platform or (is_cross_target and cross_target_platform_ == "linux-ppc64le")
      script:
        file: install_zig_symlinks.py
        env:
          CONDA_TRIPLET: ${{ conda_triplet }}
          cross_target_platform_: ${{ cross_target_platform_ }}
    requirements:
      build:
        - python 3.12.*
      host:
        # Host dep ensures targets exist during build for symlink validation
        - ${{ pin_subpackage("zig_" ~ cross_target_platform_, exact=True) }}
      run:
        - ${{ pin_subpackage("zig_" ~ cross_target_platform_, exact=True) }}
      run_exports:
        - ${{ pin_subpackage("zig", upper_bound="x.x.x") }}
    tests:
      - package_contents:
          strict: true
          bin:
            - zig
      - script:
          - if: not arm64
            then:
              - zig version
            else:
              - echo "Skip on cross-compiled platform"

  # ==========================================================================
  # TOOLCHAIN META-PACKAGE: zig-compiler (toolchain metapackage)
  # Bundles zig with C toolchain for full development environment
  # ==========================================================================
  - package:
      name: zig-compiler
    build:
      noarch: generic
      skip: cross_target_platform_ != target_platform or (is_cross_target and cross_target_platform_ == "linux-ppc64le")
      script: echo "zig-compiler metapackage"
    requirements:
      run:
        - ${{ pin_subpackage("zig", exact=True) }}
        - c-compiler
        - if: linux
          then:
            - binutils_impl_${{ target_platform }}
        - if: osx
          then:
            - lld
            - llvm-tools
    tests:
      - script:
          - zig version
          - zig cc --version

about:
  homepage: https://ziglang.org/
  license: MIT AND LicenseRef-Public-Domain
  license_file:
    - zig-source/LICENSE
    - building/mingw-defs/DISCLAIMER.PD
  summary: Zig is a general-purpose programming language and toolchain for maintaining robust, optimal, and reusable software.
  description: |
    Zig is a general-purpose programming language and toolchain for maintaining robust, optimal, and reusable software.
    Robust: Behavior is correct even for edge cases such as out of memory.
    Optimal: Write programs the best way they can behave and perform.
    Reusable: The same code works in many environments which have different constraints.
    Maintainable: Precisely communicate intent to the compiler and other programmers.
      The language imposes a low overhead to reading code and is resilient to changing requirements and environments.
  documentation: https://ziglang.org/documentation/${{ version }}/
  repository: https://github.com/ziglang/zig

extra:
  recipe-maintainers:
    - MementoRC
    - xmnlab
    - tdejager
  feedstock_name: zig
